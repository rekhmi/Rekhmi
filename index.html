<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareLook AI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { 
            --bg: #111111; --card: #1e1e1e; --primary: #8ab4f8; --primary-dark: #1a73e8; 
            --text: #e8eaed; --border: #2f3336; --error: #f4212e; --success: #81c995; 
            --muted: #9aa0a6; --user-bubble: #303134; 
        }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; border-bottom: 1px solid var(--border); height: 56px; }
        .app-title { font-size: 18px; font-weight: bold; color: var(--primary); }
        .sidebar-menu { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: var(--card); z-index: 100; transition: 0.3s; padding: 20px; }
        .sidebar-menu.open { right: 0; }
        .screen { flex: 1; display: none; overflow-y: auto; padding: 20px; }
        .screen.active { display: flex; flex-direction: column; }
        
        .chat-container { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 15px; }
        .welcome-msg { text-align: center; margin: auto; }
        .welcome-msg h1 { font-size: 32px; background: linear-gradient(45deg, #fff, var(--muted)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .msg { width: 100%; padding: 10px; margin: 10px 0; }
        .msg.user { background: var(--user-bubble); padding: 12px 16px; border-radius: 18px 18px 0 18px; align-self: flex-start; max-width: 85%; }
        
        .main-input-area { padding: 15px; border-top: 1px solid var(--border); }
        .input-wrapper { display: flex; background: #202124; border-radius: 25px; padding: 10px; align-items: center; max-width: 800px; margin: 0 auto; }
        textarea { flex: 1; background: transparent; border: none; color: #fff; outline: none; resize: none; height: 26px; }
        .send-btn { background: var(--primary-dark); border: none; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 15px; max-width: 500px; margin: 0 auto; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--border); background: #000; color: #fff; }
        button { padding: 12px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--primary-dark); color: white; width: 100%; }
        .btn-success { background: var(--success); color: black; }
    </style>
</head>
<body>

    <div class="app-header">
        <button onclick="toggleMenu()">☰</button>
        <div class="app-title">ShareLook AI</div>
        <button onclick="createNewChat()">+</button>
    </div>

    <div class="sidebar-menu" id="sidebar">
        <button onclick="toggleMenu()">✕</button>
        <div onclick="navigateTo('chat')">Assistant</div>
        <div onclick="navigateTo('calc')">Semen Calculator</div>
    </div>

    <div id="chat-screen" class="screen active">
        <div class="chat-container" id="chat-list">
            <div class="welcome-msg" id="welcome"><h1>أهلاً يا دكتور</h1></div>
            <div id="messages"></div>
        </div>
        <div class="main-input-area">
            <div class="input-wrapper">
                <textarea id="chat-input" placeholder="اسأل عن أي شيء..."></textarea>
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <div id="calc-screen" class="screen">
        <div id="step1" class="card">
            <h3>إعدادات العينة</h3>
            <input type="number" id="sample_vol" placeholder="حجم العينة (µl)">
            <input type="number" id="diluent_vol" placeholder="حجم المخفف (µl)">
            <input type="number" id="total_semen_vol" placeholder="الحجم الكلي (ml)">
            <button class="btn-primary" onclick="initCalc()">ابدأ</button>
        </div>
        <div id="step2" class="card" style="display:none;">
            <h3 id="sq_title">المربع 1</h3>
            <input type="number" id="current_total" placeholder="العدد">
            <input type="number" id="abn_total" placeholder="المشوهين">
            <button class="btn-primary" onclick="processSquare()">التالي</button>
            <button class="btn-success" onclick="showFinal()">النتيجة</button>
        </div>
        <div id="results" class="card" style="display:none;">
            <h3>النتيجة النهائية</h3>
            <div id="res_text"></div>
            <button onclick="location.reload()">تحليل جديد</button>
        </div>
    </div>

<script>
    let state = { current: 1, history: [] };
    
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    function navigateTo(t) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(t + '-screen').classList.add('active');
        toggleMenu();
    }
    
    async function sendMessage() {
        const input = document.getElementById('chat-input');
        if(!input.value) return;
        document.getElementById('welcome').style.display = 'none';
        document.getElementById('messages').innerHTML += `<div class="msg user">${input.value}</div>`;
        
        const res = await fetch("https://sharelook-chatbot.amrmahe321.workers.dev", {
            method: "POST",
            body: JSON.stringify({ history: [{role: "user", parts: [{text: input.value}]}] })
        });
        const data = await res.json();
        document.getElementById('messages').innerHTML += `<div class="msg bot">${marked.parse(data.answer)}</div>`;
        input.value = "";
    }

    function initCalc() {
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
    }

    function processSquare() {
        state.history.push({t: document.getElementById('current_total').value, abn: document.getElementById('abn_total').value});
        state.current++;
        document.getElementById('sq_title').innerText = "المربع " + state.current;
        if(state.current > 32) showFinal();
    }

    function showFinal() {
        document.getElementById('step2').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        document.getElementById('res_text').innerText = "تمت الحسابات بنجاح!";
    }

    function createNewChat() { location.reload(); }
</script>
</body>
</html>
